name: Deploy Dashboard

on:
  push:
    paths:
      - 'results/dashboard.html'
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to quickswe-dashboard
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DASHBOARD_DEPLOY_TOKEN }}
          external_repository: zuwasi/quickswe-dashboard
          publish_branch: main
          publish_dir: ./results
          destination_dir: .
          keep_files: false
          force_orphan: true
          commit_message: "Update dashboard"
